<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Screen Machine Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ecf0f1;
        }
        body {
            font-family: 'Tahoma', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px;
            background: var(--card-bg);
            border-radius: 8px;
        }
        /* สร้าง Grid 8 จอ (4 คอลัมน์ 2 แถว) */
        .monitor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }
        .machine-card {
            background: var(--card-bg);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        .machine-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .machine-title { font-size: 18px; font-weight: bold; color: #3498db; }
        .temp-display { font-size: 20px; color: #e74c3c; font-weight: bold; }
        
        .zone-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
        }
        .zone-box { background: #3d3d3d; padding: 5px; border-radius: 4px; }
        
        input[type="date"] {
            padding: 8px;
            background: #3d3d3d;
            color: white;
            border: none;
            border-radius: 4px;
        }
        canvas { max-height: 180px; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 24px; font-weight: bold;">🏭 8-Channel Production Monitor</div>
    <div>
        <label>วันที่: </label>
        <input type="date" id="dateFilter" value="2024-05-11" onchange="initDashboard()">
    </div>
</div>

<div class="monitor-grid" id="monitorContainer">
    </div>

<script>
    // รายชื่อเครื่องจักร (สมมติว่าไม่มี M2 ตามโจทย์)
    const activeMachines = ["M1", "M3", "M4", "M5", "M6", "M7", "M8"]; 
    
    function initDashboard() {
        const container = document.getElementById('monitorContainer');
        container.innerHTML = ''; // ล้างหน้าจอเก่า
        
        activeMachines.forEach(mId => {
            // สร้าง Card สำหรับแต่ละเครื่อง
            const card = document.createElement('div');
            card.className = 'machine-card';
            
            // ข้อมูลจำลอง
            const currentTemp = (Math.random() * 20 + 180).toFixed(1);
            const prodQty = Math.floor(Math.random() * 1000);
            
            card.innerHTML = `
                <div class="machine-header">
                    <span class="machine-title">${mId}</span>
                    <span class="temp-display">${currentTemp}°C</span>
                </div>
                <div style="font-size: 13px; margin-bottom: 5px;">ยอดผลิตรวม: <b>${prodQty}</b></div>
                <canvas id="chart-${mId}"></canvas>
                <div class="zone-info">
                    <div class="zone-box">Z1: ${(Math.random()*5+190).toFixed(1)}°</div>
                    <div class="zone-box">Z2: ${(Math.random()*5+195).toFixed(1)}°</div>
                    <div class="zone-box">Z3: ${(Math.random()*5+185).toFixed(1)}°</div>
                </div>
            `;
            
            container.appendChild(card);
            renderSmallChart(mId);
        });
    }

    function renderSmallChart(mId) {
        const ctx = document.getElementById(`chart-${mId}`).getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: 12}, (_, i) => `${i*2}:00`),
                datasets: [{
                    label: 'Heat',
                    data: Array.from({length: 12}, () => Math.random() * 30 + 180),
                    borderColor: '#3498db',
                    backgroundColor: 'rgba(52, 152, 219, 0.1)',
                    fill: true,
                    pointRadius: 0,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { 
                        grid: { color: '#444' },
                        ticks: { color: '#888', font: { size: 10 } }
                    }
                }
            }
        });
    }

    // เริ่มทำงาน
    window.onload = initDashboard;
</script>

</body>
</html>
