<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>LIVE Production Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --bg: #0a0a0a; --card: #1e1e1e; --text: #ffffff; --accent: #00d4ff; }
        body { background: var(--bg); color: var(--text); font-family: 'Arial', sans-serif; margin: 0; padding: 10px; overflow: hidden; }
        
        /* หัวข้อและยอดรวมรายวัน */
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px 30px; border-radius: 10px; margin-bottom: 10px; }
        .total-container { text-align: right; }
        .total-label { font-size: 1.2rem; color: #aaa; }
        .total-value { font-size: 3.5rem; font-weight: bold; color: #00ff88; line-height: 1; }

        /* Grid 8 จอ */
        .monitor-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); gap: 10px; height: 75vh; }
        .machine-card { background: var(--card); border-radius: 8px; padding: 10px; display: flex; flex-direction: column; border: 1px solid #333; }
        .m-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
        .m-name { font-size: 1.5rem; font-weight: bold; color: var(--accent); }
        .m-temp { font-size: 1.8rem; font-weight: bold; color: #ff4d4d; }
        
        .zone-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 10px; font-size: 0.8rem; }
        .zone-item { background: #333; padding: 5px; border-radius: 4px; text-align: center; }
        
        canvas { flex-grow: 1; max-height: 140px; }
        .update-tag { position: fixed; bottom: 5px; right: 10px; font-size: 0.7rem; color: #555; }
    </style>
</head>
<body>

<div class="top-bar">
    <div>
        <h1 style="margin:0; font-size: 1.8rem;">REAL-TIME MACHINE MONITOR</h1>
        <div id="current-time" style="color: var(--accent)">Loading time...</div>
    </div>
    <div class="total-container">
        <div class="total-label">ยอดผลิตรวมรายวัน (DAILY TOTAL)</div>
        <div id="daily-total" class="total-value">0</div>
    </div>
</div>

<div class="monitor-grid" id="grid">
    <!-- M1 - M8 จะถูกสร้างอัตโนมัติ -->
</div>

<div class="update-tag">Auto-refresh every 30s | Data source: Google Sheets</div>

<script>
    // *** https://docs.google.com/spreadsheets/d/e/2PACX-1vQKcJLZFXXFBS5G8k3BP0eOmllJDPS1fVTJOvQFy6VmNHyWyMjiUQv5rch2ym9I6ssZxt5Ee0f_alXz/pubhtml ***
    const SHEET_CSV_URL = 'YOUR_CSV_URL_HERE'; 
    const machines = ["M1", "M2", "M3", "M4", "M5", "M6", "M7", "M8"];
    let charts = {};

    function initCards() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        machines.forEach(m => {
            grid.innerHTML += `
                <div class="machine-card" id="card-${m}">
                    <div class="m-header">
                        <span class="m-name">${m}</span>
                        <span class="m-temp" id="temp-${m}">--°C</span>
                    </div>
                    <canvas id="chart-${m}"></canvas>
                    <div class="zone-row">
                        <div class="zone-item">Z1: <span id="z1-${m}">--</span></div>
                        <div class="zone-item">Z2: <span id="z2-${m}">--</span></div>
                        <div class="zone-item">Z3: <span id="z3-${m}">--</span></div>
                    </div>
                </div>
            `;
        });
    }

    async function updateData() {
        Papa.parse(SHEET_CSV_URL, {
            download: true,
            header: true,
            complete: function(results) {
                processData(results.data);
            }
        });
    }

    function processData(data) {
        let dailyTotal = 0;
        
        machines.forEach(m => {
            // กรองข้อมูลเฉพาะของเครื่องนั้นๆ
            const mData = data.filter(row => row.Machine === m);
            if (mData.length > 0) {
                const latest = mData[mData.length - 1]; // ข้อมูลแถวล่าสุด
                
                // อัปเดตตัวเลขหน้าจอ
                document.getElementById(`temp-${m}`).innerText = latest.Heat + '°C';
                document.getElementById(`z1-${m}`).innerText = latest.Zone1;
                document.getElementById(`z2-${m}`).innerText = latest.Zone2;
                document.getElementById(`z3-${m}`).innerText = latest.Zone3;
                
                // รวมยอดผลิต (สมมติคอลัมน์ชื่อ Qty)
                dailyTotal += parseInt(latest.DailyQty || 0);

                updateChart(m, mData.slice(-10)); // โชว์กราฟ 10 จุดล่าสุด
            }
        });
        
        document.getElementById('daily-total').innerText = dailyTotal.toLocaleString();
        document.getElementById('current-time').innerText = new Date().toLocaleString();
    }

    function updateChart(m, lastData) {
        const ctx = document.getElementById(`chart-${m}`).getContext('2d');
        if (charts[m]) charts[m].destroy();

        charts[m] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: lastData.map(d => d.Time || ''),
                datasets: [{
                    data: lastData.map(d => d.Heat),
                    borderColor: '#00d4ff',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(0, 212, 255, 0.1)',
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    x: { display: false },
                    y: { grid: { color: '#333' }, ticks: { color: '#666', font: { size: 9 } } }
                }
            }
        });
    }

    initCards();
    updateData();
    setInterval(updateData, 30000); // รีเฟรชทุก 30 วินาที
</script>

</body>
</html>
