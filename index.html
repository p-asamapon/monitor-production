<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Monitoring Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .card h3 { margin: 0; color: #7f8c8d; font-size: 14px; }
        .card p { margin: 10px 0 0; font-size: 24px; font-weight: bold; color: #2980b9; }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th { background-color: #2980b9; color: white; }
        tr:hover { background-color: #f1f1f1; }
        .status-up { color: green; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Machine Real-time Monitor</h1>

    <div class="summary-cards">
        <div class="card">
            <h3>จำนวนเครื่องจักร</h3>
            <p id="total-machines">8 เครื่อง</p>
        </div>
        <div class="card">
            <h3>ยอดผลิตรวมวันนี้</h3>
            <p id="total-production">กำลังโหลด...</p>
        </div>
        <div class="card">
            <h3>อุณหภูมิเฉลี่ย</h3>
            <p id="avg-heat">-- °C</p>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="heatChart"></canvas>
    </div>

    <div class="chart-container">
        <h3>รายละเอียดรายเครื่อง (Zone 1-2-3)</h3>
        <table id="productionTable">
            <thead>
                <tr>
                    <th>เครื่องจักร</th>
                    <th>ยอดผลิต</th>
                    <th>Zone 1 Temp</th>
                    <th>Zone 2 Temp</th>
                    <th>Zone 3 Temp</th>
                    <th>สถานะ</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script>
    // ฟังก์ชันจำลองการดึงข้อมูล (ในงานจริงให้ใช้ Fetch API ดึงจาก Google Sheets CSV link)
    function updateDashboard() {
        // รายชื่อเครื่องจักร 1-8
        const machines = Array.from({length: 8}, (_, i) => `Machine ${i + 1}`);
        
        // ข้อมูลตัวอย่าง (ข้อมูลเหล่านี้ควรดึงมาจาก Google Sheets)
        const heatData = machines.map(() => Math.floor(Math.random() * (90 - 60) + 60));
        const prodData = machines.map(() => Math.floor(Math.random() * 500));
        const z1 = machines.map(() => (Math.random() * 20 + 180).toFixed(1));
        const z2 = machines.map(() => (Math.random() * 20 + 190).toFixed(1));
        const z3 = machines.map(() => (Math.random() * 20 + 170).toFixed(1));

        // อัปเดตตัวเลขสรุป
        document.getElementById('total-production').innerText = prodData.reduce((a, b) => a + b, 0).toLocaleString() + ' ชิ้น';
        document.getElementById('avg-heat').innerText = (heatData.reduce((a, b) => a + b, 0) / 8).toFixed(1) + ' °C';

        // วาดกราฟ
        const ctx = document.getElementById('heatChart').getContext('2d');
        if(window.myChart) window.myChart.destroy(); // ลบกราฟเก่าก่อนวาดใหม่
        
        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: machines,
                datasets: [{
                    label: 'อุณหภูมิเครื่องจักร (°C)',
                    data: heatData,
                    borderColor: '#e74c3c',
                    backgroundColor: 'rgba(231, 76, 60, 0.2)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: { display: true, text: 'เปรียบเทียบความร้อน 8 เครื่องจักร' }
                }
            }
        });

        // เติมข้อมูลในตาราง
        const tbody = document.querySelector('#productionTable tbody');
        tbody.innerHTML = '';
        machines.forEach((m, i) => {
            const row = `<tr>
                <td>${m}</td>
                <td>${prodData[i]}</td>
                <td>${z1[i]}°</td>
                <td>${z2[i]}°</td>
                <td>${z3[i]}°</td>
                <td class="status-up">Online</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    // สั่งให้ทำงานครั้งแรก
    updateDashboard();
    
    // ตั้งเวลาให้รีเฟรชข้อมูลทุก 5 วินาที (Simulate Real-time)
    setInterval(updateDashboard, 5000);
</script>

</body>
</html>
